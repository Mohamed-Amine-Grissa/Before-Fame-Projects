<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telsa API Test Client</title>
  <link rel="stylesheet" href="/test-client.css">
</head>
<body>
  <main class="container">
    <h1>Telsa API Test Client</h1>
    <p class="hint">Simple page to test registration, identification, and OTP endpoints.</p>

    <section class="panel">
      <h2>Settings</h2>
      <label>
        API Base URL
        <input id="baseUrl" type="text" value="http://localhost:8080" />
      </label>
    </section>

    <section class="panel">
      <h2>1) Register Vehicle + User</h2>
      <form id="registerForm">
        <div class="grid">
          <label>Plate Type
            <select name="plateType" required>
              <option value="TN">TN</option>
              <option value="RS">RS</option>
              <option value="CD">CD</option>
              <option value="FOREIGN">FOREIGN</option>
            </select>
          </label>
          <label>Chassis Number (VIN)
            <input name="chassisNumber" value="TLSA1B2C3D4E5F6G7" required />
          </label>
          <label>Plate Number
            <input name="plateNumber" value="165 TUN 4567" required />
          </label>
          <label>First Name
            <input name="firstName" value="Ahmed" required />
          </label>
          <label>Last Name
            <input name="lastName" value="Ben Ali" required />
          </label>
          <label>Email
            <input name="email" type="email" value="ahmed@example.com" required />
          </label>
        </div>
        <button type="submit">Register</button>
      </form>
    </section>

    <section class="panel">
      <h2>2) Identify Plate Type</h2>
      <form id="identifyForm">
        <label>Plate Type
          <select name="plateType" required>
            <option value="TN">TN</option>
            <option value="RS">RS</option>
            <option value="CD">CD</option>
            <option value="FOREIGN">FOREIGN</option>
          </select>
        </label>
        <button type="submit">Identify</button>
      </form>
    </section>

    <section class="panel">
      <h2>3) Verify Vehicle</h2>
      <form id="verifyForm">
        <div class="grid">
          <label>Verification ID
            <input id="verificationId" name="verificationId" required />
          </label>
          <label>Chassis Number (VIN)
            <input name="chassisNumber" value="TLSA1B2C3D4E5F6G7" required />
          </label>
          <label>Plate Number
            <input name="plateNumber" value="165 TUN 4567" required />
          </label>
        </div>
        <button type="submit">Verify</button>
      </form>
    </section>

    <section class="panel">
      <h2>4) Send OTP</h2>
      <form id="sendOtpForm">
        <div class="grid">
          <label>User ID
            <input id="userId" name="userId" required />
          </label>
          <label>Country Code
            <input name="countryCode" value="+216" required />
          </label>
          <label>Phone Number
            <input name="phoneNumber" value="50123456" required />
          </label>
        </div>
        <button type="submit">Send OTP</button>
      </form>
    </section>

    <section class="panel">
      <h2>5) Verify OTP</h2>
      <form id="verifyOtpForm">
        <div class="grid">
          <label>OTP Session ID
            <input id="otpSessionId" name="otpSessionId" required />
          </label>
          <label>OTP Code
            <input name="otpCode" maxlength="6" required />
          </label>
        </div>
        <button type="submit">Verify OTP</button>
      </form>
    </section>

    <section class="panel">
      <h2>Last Response</h2>
      <p id="responseMeta" class="meta">No request yet.</p>
      <pre id="responseBox">{}</pre>
    </section>
  </main>

  <script src="/test-client.js"></script>
</body>
</html>
