spring.datasource.url=jdbc:h2:mem:telsa_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Twilio Test Configuration (placeholder values for tests)
twilio.account-sid=test_account_sid
twilio.auth-token=test_auth_token
twilio.phone-number=+1234567890

# OTP Configuration
otp.length=6
otp.expiration-minutes=5
otp.max-retries=3

